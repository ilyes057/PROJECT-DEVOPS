name: CI

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'chore/**'
      - 'docs/**'
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build, test and generate coverage
        run: mvn -B verify
